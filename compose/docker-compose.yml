# compose/docker-compose.yml
name: node-validation
services:

  # ---------- shared infra ----------

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [tng-net]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports:
      - "127.0.0.1:19092:19092"   # EXTERNAL listener (was 9092, mapped wrong listener)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:19092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks: [tng-net]

  aerospike:
    # Aerospike Community Edition caps at 2 namespaces; we need 3 (one per Teranode)
    # because secondary index names are unique per-namespace and cannot be shared.
    # Enterprise Edition 8.0 ships with a trial feature key and supports many namespaces.
    image: aerospike/aerospike-server-enterprise:8.0
    ports:
      - "127.0.0.1:13000:3000"
    volumes:
      # Mount the 3-namespace config to a custom path so it is not overwritten
      # by the container entrypoint (which only regenerates /etc/aerospike/aerospike.conf
      # when aerospike.template.conf is present, but we avoid that path to be safe).
      - ./aerospike/aerospike.docker.conf:/etc/aerospike/aerospike.docker.conf:ro
    command: ["--config-file", "/etc/aerospike/aerospike.docker.conf"]
    networks: [tng-net]

  postgres:
    image: postgres:15
    ports:
      - "127.0.0.1:15432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [tng-net]

  # ---------- Teranode ×3 ----------

  teranode-1:
    image: ghcr.io/bsv-blockchain/teranode:v0.15.0-beta-2
    depends_on:
      aerospike: {condition: service_started}
      kafka:     {condition: service_started}
      postgres:  {condition: service_healthy}
    ports:
      - "127.0.0.1:19292:9292"
      - "127.0.0.1:18090:8090"
      - "127.0.0.1:19091:9091"
      - "127.0.0.1:18000:8000"
      - "127.0.0.1:18444:18444"
      - "127.0.0.1:19905:9905"
      - "127.0.0.1:19906:9906"
    environment:
      SETTINGS_CONTEXT: docker
      SETTINGS_APPLICATION: teranode1
    volumes:
      - ./teranode/settings.docker.conf:/app/settings_local.conf:ro
    networks: [tng-net]

  teranode-2:
    image: ghcr.io/bsv-blockchain/teranode:v0.15.0-beta-2
    depends_on:
      aerospike: {condition: service_started}
      kafka:     {condition: service_started}
      postgres:  {condition: service_healthy}
    ports:
      - "127.0.0.1:29292:9292"
      - "127.0.0.1:28090:8090"
      - "127.0.0.1:29091:9091"
      - "127.0.0.1:28000:8000"
      - "127.0.0.1:28444:18444"
      - "127.0.0.1:29905:9905"
      - "127.0.0.1:29906:9906"
    environment:
      SETTINGS_CONTEXT: docker
      SETTINGS_APPLICATION: teranode2
    volumes:
      - ./teranode/settings.docker.conf:/app/settings_local.conf:ro
    networks: [tng-net]

  teranode-3:
    image: ghcr.io/bsv-blockchain/teranode:v0.15.0-beta-2
    depends_on:
      aerospike: {condition: service_started}
      kafka:     {condition: service_started}
      postgres:  {condition: service_healthy}
    ports:
      - "127.0.0.1:39292:9292"
      - "127.0.0.1:38090:8090"
      - "127.0.0.1:39091:9091"
      - "127.0.0.1:38000:8000"
      - "127.0.0.1:38444:18444"
      - "127.0.0.1:39905:9905"
      - "127.0.0.1:39906:9906"
    environment:
      SETTINGS_CONTEXT: docker
      SETTINGS_APPLICATION: teranode3
    volumes:
      - ./teranode/settings.docker.conf:/app/settings_local.conf:ro
    networks: [tng-net]

  # ---------- SV nodes ×3 ----------

  svnode-1:
    image: bitcoinsv/bitcoin-sv:1.1.0
    ports:
      - "127.0.0.1:18332:18332"   # RPC
      - "127.0.0.1:14444:18444"   # legacy P2P
      - "127.0.0.1:18331:28332"   # ZMQ block (was 28332, collided with svnode-2 RPC)
      - "127.0.0.1:18330:28333"   # ZMQ tx (was 28333, out of suite)
    volumes:
      # bitcoin-sv 1.1.0 does not support includeconf; mount the complete per-node
      # conf directly as bitcoin.conf so addnode/ZMQ/wallet settings are applied.
      - ./svnode/bitcoin.conf.svnode-1:/data/bitcoin.conf
    command: >
      bitcoind -datadir=/data -conf=/data/bitcoin.conf
    networks: [tng-net]

  svnode-2:
    image: bitcoinsv/bitcoin-sv:1.1.0
    ports:
      - "127.0.0.1:28332:18332"
      - "127.0.0.1:24444:18444"
    volumes:
      - ./svnode/bitcoin.conf.svnode-2:/data/bitcoin.conf
    command: >
      bitcoind -datadir=/data -conf=/data/bitcoin.conf
    networks: [tng-net]

  svnode-3:
    image: bitcoinsv/bitcoin-sv:1.1.0
    ports:
      - "127.0.0.1:38332:18332"
      - "127.0.0.1:34444:18444"
    volumes:
      - ./svnode/bitcoin.conf.svnode-3:/data/bitcoin.conf
    command: >
      bitcoind -datadir=/data -conf=/data/bitcoin.conf
    networks: [tng-net]

networks:
  tng-net:
    driver: bridge
