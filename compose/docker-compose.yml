# compose/docker-compose.yml
name: node-validation
services:

  # ---------- shared infra ----------

  # Redpanda replaces the Confluent kafka + zookeeper pair. Same Kafka wire
  # protocol (Sarama-compatible), single binary, no Zookeeper. Network-aliased
  # as `kafka` so Teranode's kafka_*Config=kafka://kafka:9092/... still resolves
  # and no settings.docker.conf changes are needed.
  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://kafka:9092,EXTERNAL://localhost:19092
    ports:
      - "127.0.0.1:19092:19092"  # external listener for host-side tooling
    networks: [tng-net]

  aerospike:
    # Aerospike Community Edition caps at 2 namespaces; we need 3 (one per Teranode)
    # because secondary index names are unique per-namespace and cannot be shared.
    # Enterprise Edition 8.0 ships with a trial feature key and supports many namespaces.
    image: aerospike/aerospike-server-enterprise:8.0
    ports:
      - "127.0.0.1:13000:3000"
    volumes:
      # Mount the 3-namespace config to a custom path so it is not overwritten
      # by the container entrypoint (which only regenerates /etc/aerospike/aerospike.conf
      # when aerospike.template.conf is present, but we avoid that path to be safe).
      - ./aerospike/aerospike.docker.conf:/etc/aerospike/aerospike.docker.conf:ro
    command: ["--config-file", "/etc/aerospike/aerospike.docker.conf"]
    networks: [tng-net]

  postgres:
    image: postgres:15
    ports:
      - "127.0.0.1:15432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [tng-net]

  # ---------- Teranode ×3 ----------

  teranode-1:
    image: ghcr.io/bsv-blockchain/teranode:v0.15.1
    depends_on:
      aerospike: {condition: service_started}
      kafka:     {condition: service_started}
      postgres:  {condition: service_healthy}
    ports:
      - "127.0.0.1:19292:9292"
      - "127.0.0.1:18090:8090"
      - "127.0.0.1:19091:9091"
      - "127.0.0.1:18000:8000"
      - "127.0.0.1:18444:18444"
      - "127.0.0.1:19905:9905"
      - "127.0.0.1:19906:9906"
    environment:
      SETTINGS_CONTEXT: docker
      SETTINGS_APPLICATION: teranode1
      # Per-node clientName so consumer-group IDs are distinct
      # (group IDs are built as "<service>.<clientName>" — e.g. blocksfinal.legacy.teranode1).
      clientName: "teranode1"
      # Hard-coded outbound legacy peers. The .docker.teranodeN context suffix in
      # settings.docker.conf is not honored by services/legacy/config.go's
      # reflection-based loader (it does FieldByName("ConnectPeers.docker.teranode1")
      # which silently fails). An un-suffixed env var bypasses this and reaches
      # the btcd config struct directly via the --connect / ConnectPeers field.
      # Note: legacy P2P only accepts /Bitcoin SV:/ user agents, so Teranode↔Teranode
      # is NOT served by this path — that's handled by the new P2P service below.
      legacy_config_ConnectPeers: "svnode-1:18444|svnode-2:18444|svnode-3:18444"
      # New libp2p P2P service. Pinned Ed25519 key so peer IDs are stable across
      # restarts. p2p_listen_addresses pins libp2p to TCP 9905 (was random by default).
      # p2p_static_peers wires the other two Teranodes by /dns/<service>/p2p/<peerID>.
      p2p_private_key: "76e0b4e7bf99eb36595c59ec9ff21ada7be304a2e6009e95820d088be8254de9d95220230ce822d1d5cd38a8722a4a75c2b44770cd502227eaeeab1fa1d1f30a"
      p2p_listen_addresses: "/ip4/0.0.0.0/tcp/9905"
      p2p_static_peers: "/dns4/teranode-2/tcp/9905/p2p/12D3KooWLz4HVfn1jCpmVP5zEb7tTXUa1oqqaczcmRbQisRxCCKT|/dns4/teranode-3/tcp/9905/p2p/12D3KooWQbnWZbq48gPXRPDP8TfSB7P69gBL2nnQvUenxL48FGHj"
      # Required to make conf.Port actually take effect in services/p2p/Server.go:358-361.
      # The image ships with this set to false; in our isolated docker network we need it on.
      p2p_share_private_addresses: "true"
      p2p_allow_private_ips: "true"
      # Per-Teranode Kafka topic namespace. We share the same Redpanda broker
      # for infrastructure simplicity but each Teranode must own its own topics
      # — they're independent nodes, not a clustered consumer group.
      kafka_blocksConfig:          "kafka://kafka:9092/teranode1-blocks?partitions=1&replication=1&retention=60000&flush_bytes=64&consumerTimeout=1800000"
      kafka_blocksFinalConfig:     "kafka://kafka:9092/teranode1-blocks-final?partitions=1&replication=1&retention=60000&flush_bytes=64&consumerTimeout=1800000"
      kafka_invalidBlocksConfig:   "kafka://kafka:9092/teranode1-invalid-blocks?partitions=1&replication=1&retention=600000&flush_bytes=1024&flush_messages=10000&flush_frequency=1s&replay=0"
      kafka_invalidSubtreesConfig: "kafka://kafka:9092/teranode1-invalid-subtrees?partitions=8&replication=1&retention=60000&segment_bytes=33554432&flush_bytes=64&flush_messages=1&replay=0"
      kafka_legacyInvConfig:       "kafka://kafka:9092/teranode1-legacy-inv?partitions=8&replication=1&retention=6000&flush_bytes=1024&flush_messages=16&flush_frequency=1s"
      kafka_rejectedTxConfig:      "kafka://kafka:9092/teranode1-rejectedtx?partitions=1&replication=1&retention=600000&flush_bytes=1024&flush_messages=10000&flush_frequency=1s&replay=0"
      kafka_subtreesConfig:        "kafka://kafka:9092/teranode1-subtrees?partitions=8&replication=1&retention=1800000&segment_bytes=33554432&flush_bytes=64&flush_messages=1&replay=0&maxProcessingTime=30000&sessionTimeout=120000&heartbeatInterval=20000&offsetReset=latest"
      kafka_txmetaConfig:          "kafka://kafka:9092/teranode1-txmeta?partitions=8&replication=1&retention=60000&flush_bytes=1024&flush_messages=10000&flush_frequency=1s"
    volumes:
      - ./teranode/settings.docker.conf:/app/settings_local.conf:ro
    networks: [tng-net]

  teranode-2:
    image: ghcr.io/bsv-blockchain/teranode:v0.15.1
    depends_on:
      aerospike: {condition: service_started}
      kafka:     {condition: service_started}
      postgres:  {condition: service_healthy}
    ports:
      - "127.0.0.1:29292:9292"
      - "127.0.0.1:28090:8090"
      - "127.0.0.1:29091:9091"
      - "127.0.0.1:28000:8000"
      - "127.0.0.1:28444:18444"
      - "127.0.0.1:29905:9905"
      - "127.0.0.1:29906:9906"
    environment:
      SETTINGS_CONTEXT: docker
      SETTINGS_APPLICATION: teranode2
      clientName: "teranode2"
      legacy_config_ConnectPeers: "svnode-1:18444|svnode-2:18444|svnode-3:18444"
      p2p_private_key: "dd43a8e20210616bc5cf243cf1561c51957dbd75d2555fe168a094ea5a6753b9a5ec24a9ff8954af51983fccdcfd82164a721a1119547a2003c90e6e644e4be2"
      p2p_listen_addresses: "/ip4/0.0.0.0/tcp/9905"
      p2p_static_peers: "/dns4/teranode-1/tcp/9905/p2p/12D3KooWQShGhTWq3gBy14sbhhwnnuvs3AdHdo4ubJa8MJJ8SUTb|/dns4/teranode-3/tcp/9905/p2p/12D3KooWQbnWZbq48gPXRPDP8TfSB7P69gBL2nnQvUenxL48FGHj"
      p2p_share_private_addresses: "true"
      p2p_allow_private_ips: "true"
      kafka_blocksConfig:          "kafka://kafka:9092/teranode2-blocks?partitions=1&replication=1&retention=60000&flush_bytes=64&consumerTimeout=1800000"
      kafka_blocksFinalConfig:     "kafka://kafka:9092/teranode2-blocks-final?partitions=1&replication=1&retention=60000&flush_bytes=64&consumerTimeout=1800000"
      kafka_invalidBlocksConfig:   "kafka://kafka:9092/teranode2-invalid-blocks?partitions=1&replication=1&retention=600000&flush_bytes=1024&flush_messages=10000&flush_frequency=1s&replay=0"
      kafka_invalidSubtreesConfig: "kafka://kafka:9092/teranode2-invalid-subtrees?partitions=8&replication=1&retention=60000&segment_bytes=33554432&flush_bytes=64&flush_messages=1&replay=0"
      kafka_legacyInvConfig:       "kafka://kafka:9092/teranode2-legacy-inv?partitions=8&replication=1&retention=6000&flush_bytes=1024&flush_messages=16&flush_frequency=1s"
      kafka_rejectedTxConfig:      "kafka://kafka:9092/teranode2-rejectedtx?partitions=1&replication=1&retention=600000&flush_bytes=1024&flush_messages=10000&flush_frequency=1s&replay=0"
      kafka_subtreesConfig:        "kafka://kafka:9092/teranode2-subtrees?partitions=8&replication=1&retention=1800000&segment_bytes=33554432&flush_bytes=64&flush_messages=1&replay=0&maxProcessingTime=30000&sessionTimeout=120000&heartbeatInterval=20000&offsetReset=latest"
      kafka_txmetaConfig:          "kafka://kafka:9092/teranode2-txmeta?partitions=8&replication=1&retention=60000&flush_bytes=1024&flush_messages=10000&flush_frequency=1s"
    volumes:
      - ./teranode/settings.docker.conf:/app/settings_local.conf:ro
    networks: [tng-net]

  teranode-3:
    image: ghcr.io/bsv-blockchain/teranode:v0.15.1
    depends_on:
      aerospike: {condition: service_started}
      kafka:     {condition: service_started}
      postgres:  {condition: service_healthy}
    ports:
      - "127.0.0.1:39292:9292"
      - "127.0.0.1:38090:8090"
      - "127.0.0.1:39091:9091"
      - "127.0.0.1:38000:8000"
      - "127.0.0.1:38444:18444"
      - "127.0.0.1:39905:9905"
      - "127.0.0.1:39906:9906"
    environment:
      SETTINGS_CONTEXT: docker
      SETTINGS_APPLICATION: teranode3
      clientName: "teranode3"
      legacy_config_ConnectPeers: "svnode-1:18444|svnode-2:18444|svnode-3:18444"
      p2p_private_key: "4ef86c557a60322d113f4f2af2846062301f5eac74d7ed7785bfabc28e76a127dba646d0b6a39821d824e91635e0854b4352a701980018501d900c58652a1ea6"
      p2p_listen_addresses: "/ip4/0.0.0.0/tcp/9905"
      p2p_static_peers: "/dns4/teranode-1/tcp/9905/p2p/12D3KooWQShGhTWq3gBy14sbhhwnnuvs3AdHdo4ubJa8MJJ8SUTb|/dns4/teranode-2/tcp/9905/p2p/12D3KooWLz4HVfn1jCpmVP5zEb7tTXUa1oqqaczcmRbQisRxCCKT"
      p2p_share_private_addresses: "true"
      p2p_allow_private_ips: "true"
      kafka_blocksConfig:          "kafka://kafka:9092/teranode3-blocks?partitions=1&replication=1&retention=60000&flush_bytes=64&consumerTimeout=1800000"
      kafka_blocksFinalConfig:     "kafka://kafka:9092/teranode3-blocks-final?partitions=1&replication=1&retention=60000&flush_bytes=64&consumerTimeout=1800000"
      kafka_invalidBlocksConfig:   "kafka://kafka:9092/teranode3-invalid-blocks?partitions=1&replication=1&retention=600000&flush_bytes=1024&flush_messages=10000&flush_frequency=1s&replay=0"
      kafka_invalidSubtreesConfig: "kafka://kafka:9092/teranode3-invalid-subtrees?partitions=8&replication=1&retention=60000&segment_bytes=33554432&flush_bytes=64&flush_messages=1&replay=0"
      kafka_legacyInvConfig:       "kafka://kafka:9092/teranode3-legacy-inv?partitions=8&replication=1&retention=6000&flush_bytes=1024&flush_messages=16&flush_frequency=1s"
      kafka_rejectedTxConfig:      "kafka://kafka:9092/teranode3-rejectedtx?partitions=1&replication=1&retention=600000&flush_bytes=1024&flush_messages=10000&flush_frequency=1s&replay=0"
      kafka_subtreesConfig:        "kafka://kafka:9092/teranode3-subtrees?partitions=8&replication=1&retention=1800000&segment_bytes=33554432&flush_bytes=64&flush_messages=1&replay=0&maxProcessingTime=30000&sessionTimeout=120000&heartbeatInterval=20000&offsetReset=latest"
      kafka_txmetaConfig:          "kafka://kafka:9092/teranode3-txmeta?partitions=8&replication=1&retention=60000&flush_bytes=1024&flush_messages=10000&flush_frequency=1s"
    volumes:
      - ./teranode/settings.docker.conf:/app/settings_local.conf:ro
    networks: [tng-net]

  # ---------- Observability ----------

  prometheus:
    image: prom/prometheus:v3.1.0
    ports:
      - "127.0.0.1:19090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=6h
      - --web.enable-lifecycle
    networks: [tng-net]

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "127.0.0.1:13030:3000"   # 13000 is taken by aerospike
    environment:
      # No login: anonymous Admin access, basic-auth/login form disabled.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_BASIC_ENABLED: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: publicDashboards
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [prometheus]
    networks: [tng-net]

  # ---------- SV nodes ×3 ----------

  svnode-1:
    image: bitcoinsv/bitcoin-sv:1.1.0
    ports:
      - "127.0.0.1:18332:18332"   # RPC
      - "127.0.0.1:14444:18444"   # legacy P2P
      - "127.0.0.1:18331:28332"   # ZMQ block (was 28332, collided with svnode-2 RPC)
      - "127.0.0.1:18330:28333"   # ZMQ tx (was 28333, out of suite)
    volumes:
      # bitcoin-sv 1.1.0 does not support includeconf; mount the complete per-node
      # conf directly as bitcoin.conf so addnode/ZMQ/wallet settings are applied.
      - ./svnode/bitcoin.conf.svnode-1:/data/bitcoin.conf
    command: >
      bitcoind -datadir=/data -conf=/data/bitcoin.conf -printtoconsole=1
    networks: [tng-net]

  svnode-2:
    image: bitcoinsv/bitcoin-sv:1.1.0
    ports:
      - "127.0.0.1:28332:18332"
      - "127.0.0.1:24444:18444"
    volumes:
      - ./svnode/bitcoin.conf.svnode-2:/data/bitcoin.conf
    command: >
      bitcoind -datadir=/data -conf=/data/bitcoin.conf -printtoconsole=1
    networks: [tng-net]

  svnode-3:
    image: bitcoinsv/bitcoin-sv:1.1.0
    ports:
      - "127.0.0.1:38332:18332"
      - "127.0.0.1:34444:18444"
    volumes:
      - ./svnode/bitcoin.conf.svnode-3:/data/bitcoin.conf
    command: >
      bitcoind -datadir=/data -conf=/data/bitcoin.conf -printtoconsole=1
    networks: [tng-net]

networks:
  tng-net:
    driver: bridge
