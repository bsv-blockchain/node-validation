# compose/teranode/settings.docker.conf
# Overlay loaded when SETTINGS_CONTEXT=docker.tng. Each Teranode container
# sets PORT_PREFIX=1, 2, or 3 to select its namespace + database + topic.

network.docker.tng = regtest

# --- Genesis + Chronicle activation forced from block 1 ---
# Per the SP4-DOCKER spec §4.1, both consensus rule sets activate at the
# very first block so script-rule tests don't need to mine past activation
# heights.
genesis_activation_height.docker.tng = 1
chronicle_activation_height.docker.tng = 1

# --- Shared infra (per-node namespacing via PORT_PREFIX) ---
postgres_url.docker.tng = postgresql://teranode:teranode@postgres:5432/teranode1
aerospike_host.docker.tng = aerospike
aerospike_port.docker.tng = 3000
aerospike_namespace.docker.tng = teranode1
kafka_brokers.docker.tng = kafka:9092
kafka_topic_prefix.docker.tng = teranode-1.

# Per-node overrides — gocore picks the most-specific matching key.
# teranode-2 sets SETTINGS_APPLICATION=teranode2 to pick these:
postgres_url.docker.tng.teranode2 = postgresql://teranode:teranode@postgres:5432/teranode2
aerospike_namespace.docker.tng.teranode2 = teranode2
kafka_topic_prefix.docker.tng.teranode2 = teranode-2.

# teranode-3:
postgres_url.docker.tng.teranode3 = postgresql://teranode:teranode@postgres:5432/teranode3
aerospike_namespace.docker.tng.teranode3 = teranode3
kafka_topic_prefix.docker.tng.teranode3 = teranode-3.

# --- enabled services ---
startBlockchain.docker.tng = true
startBlockAssembly.docker.tng = true
startBlockValidation.docker.tng = true
startSubtreeValidation.docker.tng = true
startPropagation.docker.tng = true
startValidator.docker.tng = true
startP2P.docker.tng = true
startLegacy.docker.tng = true
startAsset.docker.tng = true
startRPC.docker.tng = true
startBlockPersister.docker.tng = true

# --- RPC auth ---
rpc_user.docker.tng = bitcoin
rpc_pass.docker.tng = bitcoin

# --- Listen on all interfaces inside the container ---
rpc_listener_url.docker.tng = http://:9292
asset_httpListenAddress.docker.tng = :8090
health_check_httpListenAddress.docker.tng = :8000
profilerAddr.docker.tng = :9091

# --- Legacy P2P mesh peers ---
# Each Teranode peers with the 5 OTHERS by docker service name.
# teranode-1 default:
legacy_config_AddPeers.docker.tng = teranode-2:18444,teranode-3:18444,svnode-1:18444,svnode-2:18444,svnode-3:18444
legacy_config_AddPeers.docker.tng.teranode2 = teranode-1:18444,teranode-3:18444,svnode-1:18444,svnode-2:18444,svnode-3:18444
legacy_config_AddPeers.docker.tng.teranode3 = teranode-1:18444,teranode-2:18444,svnode-1:18444,svnode-2:18444,svnode-3:18444
