# compose/aerospike/aerospike.docker.conf
# Three namespaces, one per Teranode instance.
#
# Aerospike Community Edition caps at 2 namespaces; we need 3 because
# secondary index names are unique per namespace (not per set), so each
# Teranode instance must have its own namespace to avoid index conflicts.
# Aerospike Enterprise Edition 8.0 ships with a trial feature key and
# supports many namespaces.
#
# Using in-memory storage for a stateless dev/test environment.

service {
    cluster-name teranode-compose
}

logging {
    console {
        context any info
    }
}

network {
    service {
        address any
        port 3000
    }

    heartbeat {
        mode mesh
        address local
        port 3002
        interval 150
        timeout 10
    }

    fabric {
        address local
        port 3001
    }
}

namespace teranode1 {
    default-ttl 0
    replication-factor 1
    storage-engine memory {
        data-size 1G
        evict-used-pct 70
    }
}

namespace teranode2 {
    default-ttl 0
    replication-factor 1
    storage-engine memory {
        data-size 1G
        evict-used-pct 70
    }
}

namespace teranode3 {
    default-ttl 0
    replication-factor 1
    storage-engine memory {
        data-size 1G
        evict-used-pct 70
    }
}
