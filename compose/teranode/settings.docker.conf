# compose/teranode/settings.docker.conf
# Overlay loaded via SETTINGS_CONTEXT=docker, SETTINGS_APPLICATION=teranodeN.
#
# The upstream settings.conf (baked into the image at /app/settings.conf) already
# resolves the docker context for: network=regtest, all startXxx flags, blockstore,
# subtreestore, profiler port, RPC credentials, etc.  We only override what differs
# in our single-host compose environment vs the upstream multi-host docker setup.

# ---------- Kafka -----------------------------------------------------------------
# Upstream docker context points to "kafka-shared" — our service is named "kafka".
KAFKA_HOSTS.docker = kafka:9092

# ---------- Blockchain (postgres) -------------------------------------------------
# The upstream docker context derives user/password from blockchainDBUserPwd which
# maps to "miner1/2/3"; our postgres uses a single "teranode" user.
blockchain_store.docker.teranode1 = postgres://teranode:teranode@postgres:5432/teranode1
blockchain_store.docker.teranode2 = postgres://teranode:teranode@postgres:5432/teranode2
blockchain_store.docker.teranode3 = postgres://teranode:teranode@postgres:5432/teranode3

# ---------- UTXO store (aerospike) ------------------------------------------------
# Upstream docker context does not define utxostore for plain docker.teranodeN;
# we provide a single shared aerospike instance with per-namespace isolation.
# Aerospike secondary index names are unique per-namespace (not per-set), so each
# Teranode instance must have its own namespace; see aerospike.docker.conf.
# We use Aerospike Enterprise Edition (both CE 6.x and 8.x cap at 2 namespaces).
utxostore.docker.teranode1 = aerospike://aerospike:3000/teranode1?set=utxo&WarmUp=0&ConnectionQueueSize=16&LimitConnectionsToQueueSize=true&MinConnectionsPerNode=8&externalStore=null:///
utxostore.docker.teranode2 = aerospike://aerospike:3000/teranode2?set=utxo&WarmUp=0&ConnectionQueueSize=16&LimitConnectionsToQueueSize=true&MinConnectionsPerNode=8&externalStore=null:///
utxostore.docker.teranode3 = aerospike://aerospike:3000/teranode3?set=utxo&WarmUp=0&ConnectionQueueSize=16&LimitConnectionsToQueueSize=true&MinConnectionsPerNode=8&externalStore=null:///

# ---------- Internal gRPC addresses -----------------------------------------------
# Upstream docker context resolves these to "${clientName}:PORT" which would be
# "teranode1:PORT".  In our compose, the service hostname is "teranode-1" (with
# hyphen) and cannot be predicted by clientName alone.  Since all services run in
# the same binary (all-in-one), they listen on localhost — override to localhost.
blockchain_grpcAddress.docker     = localhost:8087
blockassembly_grpcAddress.docker  = localhost:8085
validator_grpcAddress.docker      = localhost:8081

# ---------- Propagation gRPC addresses (cross-node) --------------------------------
# Upstream docker context sets propagation_grpcAddresses to "teranode1/2/3:PORT"
# which matches clientName; our compose service names are teranode-1/2/3 (hyphen).
# Each node connects outward to the other two for propagation.
propagation_grpcAddresses.docker.teranode1 = teranode-2:8084 | teranode-3:8084
propagation_grpcAddresses.docker.teranode2 = teranode-1:8084 | teranode-3:8084
propagation_grpcAddresses.docker.teranode3 = teranode-1:8084 | teranode-2:8084

# ---------- Legacy service --------------------------------------------------------
# Upstream sets startLegacy.docker = false (microservice topology).
# We run all-in-one so we need legacy enabled.
startLegacy.docker = true

# Restore FSM state from previous run.  On a fresh chain (blocks-final Kafka topic
# empty, 60 s retention) the FSM starts in IDLE, and legacy.(*Server).Start() blocks
# on WaitUntilFSMTransitionFromIdleState() forever — a deadlock.  bootstrap.sh breaks
# this deadlock by calling blockchain_api.BlockchainAPI.SendFSMEvent(RUN) immediately
# after the RPC port comes up.  fsm_state_restore is kept here so that restarts of an
# already-bootstrapped chain (where blocks-final has recent messages) also recover.
fsm_state_restore = true

# Disable UPnP for the legacy btcd listener (UPnP blocks listener init in docker).
legacy_config_Upnp.docker = false

# Legacy P2P peers — each Teranode connects to the two other Teranodes and all
# three SVnodes.
# legacy_config_ConnectPeers has a base default (empty) so the .docker.teranodeN
# context override IS picked up and passed to the btcd Config.ConnectPeers slice.
# Teranode-to-teranode: port 8333 (btcd/bsvd hardcodes mainnet port regardless of
#   network=regtest; the legacy_config_Listeners setting is also ignored for port).
# Teranode-to-svnode: port 18444 (bitcoin-sv 1.1.0 regtest P2P default).
legacy_config_ConnectPeers.docker.teranode1 = teranode-2:8333 | teranode-3:8333 | svnode-1:18444 | svnode-2:18444 | svnode-3:18444
legacy_config_ConnectPeers.docker.teranode2 = teranode-1:8333 | teranode-3:8333 | svnode-1:18444 | svnode-2:18444 | svnode-3:18444
legacy_config_ConnectPeers.docker.teranode3 = teranode-1:8333 | teranode-2:8333 | svnode-1:18444 | svnode-2:18444 | svnode-3:18444

# ---------- Listen addresses ------------------------------------------------------
# Upstream docker.host context uses PORT_PREFIX for multi-instance on one host;
# in our compose each container has its own network identity so we use fixed ports.
rpc_listener_url.docker       = http://:9292
asset_httpListenAddress.docker = :8090
health_check_httpListenAddress.docker = :8000
profilerAddr.docker = :9091
